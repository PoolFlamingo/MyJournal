name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows bundles
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Upload macOS bundles
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Linux bundles
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout (for version reading)
        uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles/
          merge-multiple: false

      - name: Generate updater manifest (latest.json)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Extract version from tag (strip leading 'v')
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES="See release notes at https://github.com/${REPO}/releases/tag/${TAG}"

          # Read signature files
          read_sig() {
            local pattern="$1"
            local file
            file=$(find bundles/ -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$file" ]; then cat "$file"; else echo ""; fi
          }

          # Find bundle filenames
          find_name() {
            local pattern="$1"
            find bundles/ -name "$pattern" -not -name "*.sig" -type f 2>/dev/null | head -1 | xargs -r basename
          }

          NSIS_NAME=$(find_name "*.exe")
          NSIS_SIG=$(read_sig "*.exe.sig")
          APPIMAGE_NAME=$(find_name "*.AppImage")
          APPIMAGE_SIG=$(read_sig "*.AppImage.sig")
          MACOS_NAME=$(find_name "*.app.tar.gz")
          MACOS_SIG=$(read_sig "*.app.tar.gz.sig")

          # Build the manifest JSON
          cat > latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "${DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "${BASE_URL}/${NSIS_NAME}"
              },
              "linux-x86_64": {
                "signature": "${APPIMAGE_SIG}",
                "url": "${BASE_URL}/${APPIMAGE_NAME}"
              },
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "${BASE_URL}/${MACOS_NAME}"
              }
            }
          }
          MANIFEST

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bundles/**/*
            latest.json
